<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آرسام اپلیکیشن</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>آرسام اپلیکیشن</h1>
        <p>بهترین اپلیکیشن‌های ایرانی • فقط برای شما</p>
    </header>

    <main>
        <!-- بخش آپلود (فقط برای تو) -->
        <div class="upload-section">
            <h2>آپلود اپلیکیشن جدید</h2>
            <input type="text" id="app-name" placeholder="نام اپلیکیشن">
            <input type="text" id="app-desc" placeholder="توضیح کوتاه">
            <input type="text" id="app-link" placeholder="لینک مستقیم دانلود (از گوگل درایو)">
            <input type="text" id="app-version" placeholder="نسخه اپ (مثلاً 1.2.3)">
            <button onclick="uploadApp()">آپلود به سایت</button>
        </div>

        <div class="search-bar">
            <input type="text" id="search" placeholder="جستجو در اپ‌ها..." onkeyup="searchApps()">
        </div>

        <div class="apps-grid" id="apps-grid"></div>
    </main>

    <!-- مدال جزئیات -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <h2 id="modal-title"></h2>
            <p id="modal-desc"></p>
            <p id="modal-version"></p>
            <a id="modal-link" href="#" target="_blank" class="download-btn">دانلود مستقیم</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
